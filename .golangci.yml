# golangci-lint configuration
# See https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck       # Check for unchecked errors
    - gosimple       # Simplify code
    - govet          # Go vet analysis
    - ineffassign    # Detect ineffective assignments
    - staticcheck    # Go static analysis
    - unused         # Check for unused code
    - gofmt          # Check formatting
    - goimports      # Check imports
    - misspell       # Check for misspelled words
    - gocritic       # Opinionated Go source code checker
    - revive         # Fast, configurable, extensible linter
    - stylecheck     # Style checker
    - unparam        # Unused function parameters
    - unconvert      # Unnecessary type conversions
    - prealloc       # Find slice declarations that could be preallocated
    - nolintlint     # Ill-formed or insufficient nolint directives
    - exportloopref  # Checks for pointers to enclosing loop variables
    - gocyclo        # Cyclomatic complexity
    - dupl           # Code clone detection
    - bodyclose      # HTTP response body is closed
    - sqlclosecheck  # SQL rows/stmt is closed

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    
  govet:
    enable-all: true
    disable:
      - shadow  # Can be too noisy
      
  gocyclo:
    min-complexity: 15
    
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - unnamedResult  # Can be verbose for simple functions
      - hugeParam      # Sometimes large structs are passed by value intentionally
      
  revive:
    rules:
      - name: exported
        disabled: false
      - name: unexported-return
        disabled: false
      - name: unused-parameter
        disabled: false
      - name: var-naming
        disabled: false
      - name: context-as-argument
        disabled: false
        
  stylecheck:
    checks: ["all", "-ST1000"]  # Disable package comment check
    
  misspell:
    locale: US
    
issues:
  exclude-rules:
    # Exclude test files from certain checks
    - path: _test\.go
      linters:
        - gocyclo
        - dupl
        - gocritic
        
    # Allow long lines in generated code
    - path: ".*\\.pb\\.go$"
      linters:
        - all
        
  max-issues-per-linter: 50
  max-same-issues: 3
  
output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  uniq-by-line: true
  sort-results: true
